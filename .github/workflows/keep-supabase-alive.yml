name: Garder Supabase actif

on:
  schedule:
    # Lundi et jeudi à 9h UTC (~tous les 3-4 jours, bien avant la limite de 7 jours)
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/ping-supabase.mjs
